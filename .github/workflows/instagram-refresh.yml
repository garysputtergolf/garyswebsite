name: Refresh Instagram Feed

on:
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Instagram Data
        env:
          INSTAGRAMACCESSTOKEN: ${{ secrets.INSTAGRAMACCESSTOKEN }}
        run: |
          ./scripts/fetch_instagram.sh

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/instagram_feed.json
          git commit -m "chore(instagram): hourly feed update" || exit 0
          git push
